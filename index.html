<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Te Quiero Mucho</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      overflow: hidden;
      font-family: 'Lato', sans-serif;
    }

    /* Animated background petals */
    .petals {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .petal {
      position: absolute;
      top: -40px;
      font-size: 1.2rem;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.7; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* Banner card */
    .banner {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 4rem 5rem;
      border: 1px solid rgba(255, 160, 160, 0.18);
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border-radius: 4px;
      max-width: 680px;
      width: 90vw;
      animation: fadeIn 1.8s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      letter-spacing: 0.25em;
      font-size: 0.65rem;
      text-transform: uppercase;
      color: rgba(255, 160, 160, 0.55);
      margin-bottom: 2rem;
    }

    .main-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 400;
      color: #fff;
      line-height: 1.15;
      letter-spacing: -0.01em;
      margin-bottom: 0.35em;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-style: normal;
      font-weight: 700;
      font-size: clamp(2.6rem, 7vw, 4.6rem);
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #ff9a9e 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      display: block;
      line-height: 1.1;
    }

    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,160,160,0.5), transparent);
      margin: 2rem auto;
    }

    .signature {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
    }

    .heart {
      display: inline-block;
      color: #ff6b6b;
      font-size: 0.9rem;
      margin: 0 0.3em;
      animation: heartbeat 1.4s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.25); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.2); }
      56%       { transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- Falling petals -->
  <div class="petals" id="petals"></div>

  <!-- Banner -->
  <div class="banner">
    <p class="eyebrow">Para ti</p>
    <h1 class="main-title">Te Quiero Mucho</h1>
    <span class="name">Estibalys</span>
    <div class="divider"></div>
    <p class="signature">Atte: Oscar <span class="heart">♥</span></p>
  </div>

  <script>
    // Generate falling rose petals / hearts
    const container = document.getElementById('petals');
    const symbols = ['🌸', '❤️', '🌹', '✨', '💕'];
    const count = 22;

    for (let i = 0; i < count; i++) {
      const el = document.createElement('span');
      el.classList.add('petal');
      el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (0.8 + Math.random() * 1.4) + 'rem';
      el.style.animationDuration = (6 + Math.random() * 10) + 's';
      el.style.animationDelay = (Math.random() * 10) + 's';
      el.style.opacity = '0';
      container.appendChild(el);
    }
  </script>
</body>
</html>
