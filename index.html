<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>En Construcción</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: 'Lato', sans-serif;
    }

    /* ALERT */
    .alert-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.25);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .alert-box {
      background: #fff;
      border-top: 4px solid #e6a817;
      border-radius: 6px;
      padding: 2rem 2.2rem;
      max-width: 400px; width: 88vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .alert-title {
      display: flex; align-items: center; gap: 0.6rem;
      font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: #e6a817; margin-bottom: 1rem;
    }
    .alert-box h2 { font-weight: 400; font-size: 1rem; color: #2c2c2c; margin-bottom: 0.5rem; }
    .alert-box p  { font-weight: 300; font-size: 0.88rem; color: #666; line-height: 1.6; margin-bottom: 1.6rem; }
    .alert-buttons { display: flex; gap: 0.75rem; justify-content: flex-end; }
    .btn { padding: 0.5rem 1.4rem; border-radius: 4px; font-size: 0.85rem; cursor: pointer; border: none; }
    .btn-no  { background: #eee; color: #888; }
    .btn-yes { background: #2c2c2c; color: #fff; }

    /* ENVELOPE */
    .scene-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .scene-overlay.show { opacity: 1; pointer-events: all; }

    .env-wrap { position: relative; width: 280px; height: 190px; }

    .env-body {
      position: absolute; bottom: 0;
      width: 280px; height: 160px;
      background: #f5e6c8;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .env-body::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 0; height: 0;
      border-left: 140px solid #e8d4a8;
      border-right: 140px solid #e8d4a8;
      border-top: 80px solid transparent;
    }
    .env-body::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #dfc898 50%, transparent 50%),
                  linear-gradient(225deg, #dfc898 50%, transparent 50%);
      background-size: 50% 100%;
      background-position: left, right;
      background-repeat: no-repeat;
    }

    .env-flap {
      position: absolute; top: 0; left: 0;
      width: 280px; height: 140px;
      transform-origin: top center;
      transform: rotateX(0deg);
      transition: transform 0.9s cubic-bezier(0.4,0,0.2,1);
      z-index: 10;
    }
    .env-flap svg { width: 100%; height: 100%; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15)); }
    .env-flap.open { transform: rotateX(180deg); }

    .paper {
      position: absolute; bottom: 10px; left: 50%;
      transform: translateX(-50%) translateY(0);
      width: 230px; background: #fffdf5;
      border-radius: 3px; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      padding: 1.4rem 1.4rem 1rem;
      opacity: 0; z-index: 5;
      transition: transform 0.8s ease 0.7s, opacity 0.5s ease 0.7s;
    }
    .paper.rise { transform: translateX(-50%) translateY(-220px); opacity: 1; }

    /* LETTER */
    .letter-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
      z-index: 300; opacity: 0; pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .letter-overlay.show { opacity: 1; pointer-events: all; }

    .letter-card {
      background: #fffdf5; border-radius: 4px;
      max-width: 420px; width: 88vw;
      box-shadow: 0 12px 48px rgba(0,0,0,0.2); overflow: hidden;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.5s ease;
    }
    .letter-overlay.show .letter-card { transform: translateY(0) scale(1); }

    .letter-top {
      background: #2c2c2c; padding: 1rem 1.6rem;
      font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
    .letter-body { padding: 2.2rem 2.4rem 1.6rem; }

    #typedMessage {
      font-family: 'Lato', sans-serif; font-weight: 400;
      font-size: 0.97rem; color: #1a1a1a;
      line-height: 1.9; margin-bottom: 1.8rem; min-height: 3rem;
    }

    .sign {
      font-weight: 300; font-size: 0.78rem; letter-spacing: 0.12em;
      color: #555; text-align: right;
      opacity: 0; transition: opacity 0.6s ease;
    }
    .sign.visible { opacity: 1; }

    .cursor {
      display: inline-block; width: 2px; height: 1em;
      background: #1a1a1a; margin-left: 2px; vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .close-btn {
      display: block; margin: 0 auto 1.4rem;
      background: none; border: 1px solid #e0e0e0; color: #aaa;
      font-size: 0.72rem; letter-spacing: 0.1em; padding: 0.4rem 1.2rem;
      border-radius: 3px; cursor: pointer;
      opacity: 0; pointer-events: none; transition: opacity 0.6s ease;
    }
    .close-btn.visible { opacity: 1; pointer-events: all; }
    .close-btn:hover { opacity: 0.6; }
  </style>
</head>
<body>

  <!-- Alert -->
  <div class="alert-overlay" id="alertOverlay">
    <div class="alert-box">
      <div class="alert-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e6a817" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Aviso del sistema
      </div>
      <h2>Hola Estibalys, Bienvenida 👋</h2>
      <p>Este sitio web está actualmente en construcción.<br><br>
      Sin embargo, tienes un mensaje privado de <strong>Oscar</strong>.<br>
      ¿Deseas leerlo?</p>
      <div class="alert-buttons">
        <button class="btn btn-no" onclick="dismiss()">No</button>
        <button class="btn btn-yes" onclick="startEnvelope()">Sí, leer mensaje</button>
      </div>
    </div>
  </div>

  <!-- Envelope -->
  <div class="scene-overlay" id="sceneOverlay">
    <div class="env-wrap">
      <div class="paper" id="paper">
        <svg width="100%" height="8" style="margin-bottom:8px"><line x1="0" y1="4" x2="100%" y2="4" stroke="#e0d8c0" stroke-width="1"/></svg>
        <svg width="100%" height="8" style="margin-bottom:8px"><line x1="0" y1="4" x2="100%" y2="4" stroke="#e0d8c0" stroke-width="1"/></svg>
        <svg width="100%" height="8"><line x1="0" y1="4" x2="100%" y2="4" stroke="#e0d8c0" stroke-width="1"/></svg>
      </div>
      <div class="env-body"></div>
      <div class="env-flap" id="envFlap">
        <svg viewBox="0 0 280 140" xmlns="http://www.w3.org/2000/svg">
          <polygon points="0,0 280,0 140,130" fill="#e8d4a8"/>
          <polygon points="0,0 280,0 140,130" fill="none" stroke="#d4bc88" stroke-width="1"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Letter -->
  <div class="letter-overlay" id="letterOverlay">
    <div class="letter-card">
      <div class="letter-top">Mensaje privado · Solo para ti</div>
      <div class="letter-body">
        <p id="typedMessage"><span class="cursor"></span></p>
        <p class="sign" id="sign">Atte: Oscar</p>
      </div>
      <button class="close-btn" id="closeBtn" onclick="closeLetter()">cerrar</button>
    </div>
  </div>

  <script>
    function dismiss() {
      document.getElementById('alertOverlay').style.display = 'none';
    }

    function startEnvelope() {
      document.getElementById('alertOverlay').style.display = 'none';
      var scene = document.getElementById('sceneOverlay');
      scene.classList.add('show');

      setTimeout(function() {
        document.getElementById('envFlap').classList.add('open');
      }, 400);

      setTimeout(function() {
        document.getElementById('paper').classList.add('rise');
      }, 1100);

      setTimeout(function() {
        scene.style.opacity = '0';
        setTimeout(function() {
          scene.classList.remove('show');
          scene.style.opacity = '';
          openLetter();
        }, 500);
      }, 2400);
    }

    function openLetter() {
      document.getElementById('letterOverlay').classList.add('show');
      setTimeout(startTyping, 600);
    }

    function closeLetter() {
      document.getElementById('letterOverlay').classList.remove('show');
      setTimeout(function() {
        document.getElementById('typedMessage').innerHTML = '<span class="cursor"></span>';
        document.getElementById('sign').classList.remove('visible');
        document.getElementById('closeBtn').classList.remove('visible');
        document.getElementById('envFlap').classList.remove('open');
        document.getElementById('paper').classList.remove('rise');
      }, 500);
    }

    function startTyping() {
      var el = document.getElementById('typedMessage');

      // Message split into parts: plain text or line breaks
      var parts = [
        'Hola bb,',
        '\n\n',
        'S\u00f3lo quer\u00eda recordarte que... Me gustas mucho !!',
        '\n\n',
        'Siempre est\u00e1s en mi mente !!',
        '\n\n',
        'Te Quiero \u2764\ufe0f'
      ];

      // Flatten into character tokens
      var tokens = [];
      parts.forEach(function(part) {
        if (part === '\n\n') {
          tokens.push({ ch: '\n\n', br: true });
        } else {
          var segs = Array.from(part);
          segs.forEach(function(ch) { tokens.push({ ch: ch, br: false }); });
        }
      });

      var i = 0;
      var displayed = '';

      function typeNext() {
        if (i >= tokens.length) {
          el.innerHTML = displayed;
          document.getElementById('sign').classList.add('visible');
          document.getElementById('closeBtn').classList.add('visible');
          return;
        }

        var token = tokens[i];
        if (token.br) {
          displayed += '<br><br>';
          el.innerHTML = displayed + '<span class="cursor"></span>';
          i++;
          setTimeout(typeNext, 300);
        } else {
          displayed += token.ch;
          el.innerHTML = displayed + '<span class="cursor"></span>';
          i++;
          var ch = token.ch;
          var pause = (ch === '.' || ch === ',') ? 350 : 80;
          setTimeout(typeNext, pause);
        }
      }

      typeNext();
    }
  </script>
</body>
</html>
