<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Estibalys</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Lato:wght@300&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: 'Lato', sans-serif;
    }

    .banner {
      text-align: center;
      padding: 3rem 3.5rem;
    }

    .main {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(2rem, 6vw, 3.2rem);
      color: #888;
      font-weight: 400;
      margin: 0 0 0.3rem 0;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-style: normal;
      font-size: clamp(2.4rem, 7vw, 3.8rem);
      color: #2c2c2c;
      font-weight: 400;
      margin: 0 0 2rem 0;
    }

    .signature {
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="banner">
    <p class="main">Te Quiero</p>
    <p class="name">Estibalys</p>
    <p class="signature">Atte: Oscar A.</p>
  </div>
</body>
</html>
